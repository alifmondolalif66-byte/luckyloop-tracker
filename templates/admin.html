<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuckyLoop — Admin Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600&display=swap');

  :root {
    --bg:      #000000;
    --card:    #0a0a0a;
    --card2:   #111111;
    --border:  #1e1e1e;
    --accent:  #00e5ff;
    --green:   #22c55e;
    --yellow:  #facc15;
    --red:     #ef4444;
    --orange:  #f97316;
    --text:    #e2e8f0;
    --muted:   #475569;
    --white:   #ffffff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 0%, #001a1f 0%, #000 60%);
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 48px 40px;
    width: 380px;
    text-align: center;
  }
  .login-box .icon { font-size: 42px; margin-bottom: 12px; }
  .login-box h1 { font-size: 22px; color: var(--white); letter-spacing: 3px; }
  .login-box p  { color: var(--muted); font-size: 11px; margin-top: 4px; margin-bottom: 32px; }
  .login-box input {
    width: 100%; padding: 14px 16px;
    background: var(--card2); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 13px;
    outline: none; margin-bottom: 16px;
    transition: border-color .2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 14px;
    background: var(--accent); color: #000;
    font-family: inherit; font-size: 13px; font-weight: 700;
    border: none; cursor: pointer; letter-spacing: 1px;
    transition: opacity .2s;
  }
  .login-box button:hover { opacity: .85; }
  .login-error { color: var(--red); font-size: 11px; margin-top: 10px; min-height: 16px; }

  /* ── MAIN APP ── */
  #app { display: none; }

  /* Header */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-left .logo { font-size: 18px; font-weight: 700; color: var(--white); letter-spacing: 2px; }
  .header-left .sub  { font-size: 11px; color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .last-sync { font-size: 10px; color: var(--muted); }
  .btn-logout {
    padding: 6px 14px; font-size: 10px; font-family: inherit;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; letter-spacing: 1px;
    transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* Stats bar */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--card);
    padding: 20px 24px;
  }
  .stat-card .label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .value.total   { color: var(--accent); }
  .stat-card .value.active  { color: var(--green); }
  .stat-card .value.blocked { color: var(--red); }
  .stat-card .value.online  { color: var(--yellow); }

  /* Toolbar */
  .toolbar {
    padding: 16px 28px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .toolbar input {
    flex: 1; max-width: 300px;
    padding: 9px 14px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 12px;
    outline: none; transition: border-color .2s;
  }
  .toolbar input:focus { border-color: var(--accent); }
  .toolbar select {
    padding: 9px 14px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 12px;
    outline: none; cursor: pointer;
  }
  .btn-refresh {
    padding: 9px 18px; font-size: 11px; font-family: inherit; font-weight: 600;
    background: var(--accent); color: #000;
    border: none; cursor: pointer; letter-spacing: 1px;
    transition: opacity .2s;
  }
  .btn-refresh:hover { opacity: .85; }
  .auto-label { font-size: 10px; color: var(--muted); margin-left: auto; }

  /* Table */
  .table-wrap { padding: 0 28px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  thead tr { border-bottom: 1px solid var(--border); }
  thead th {
    text-align: left; padding: 10px 14px;
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); font-weight: 600;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  tbody tr:hover { background: var(--card); }
  tbody td { padding: 14px 14px; font-size: 12px; vertical-align: middle; }

  /* Status badge */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; font-size: 10px; font-weight: 700; letter-spacing: 1px;
  }
  .badge.active  { background: #052e16; color: var(--green); }
  .badge.blocked { background: #2d0707; color: var(--red); }
  .badge.offline { background: #1a1a1a; color: var(--muted); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Online indicator */
  .online-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .online-dot.yes { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .online-dot.no  { background: var(--muted); }

  /* Device info */
  .device-name { color: var(--white); font-weight: 600; font-size: 13px; }
  .device-id   { color: var(--muted); font-size: 10px; margin-top: 2px; font-family: monospace; }
  .device-ip   { color: var(--muted); font-size: 10px; }

  .license-tag {
    display: inline-block; padding: 2px 8px;
    font-size: 9px; letter-spacing: 1px;
    background: #0f1f14; color: var(--green); border: 1px solid #1a3326;
  }

  /* Action buttons */
  .btn-block {
    padding: 6px 14px; font-size: 10px; font-family: inherit; font-weight: 600;
    background: transparent; border: 1px solid var(--red);
    color: var(--red); cursor: pointer; letter-spacing: 1px;
    transition: all .2s;
  }
  .btn-block:hover { background: var(--red); color: #000; }
  .btn-unblock {
    padding: 6px 14px; font-size: 10px; font-family: inherit; font-weight: 600;
    background: transparent; border: 1px solid var(--green);
    color: var(--green); cursor: pointer; letter-spacing: 1px;
    transition: all .2s;
  }
  .btn-unblock:hover { background: var(--green); color: #000; }
  .btn-delete {
    padding: 6px 10px; font-size: 10px; font-family: inherit;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
    transition: all .2s; margin-left: 4px;
  }
  .btn-delete:hover { border-color: var(--orange); color: var(--orange); }

  /* Empty / loading */
  .empty-row td {
    text-align: center; padding: 60px; color: var(--muted); font-size: 12px;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 28px; right: 28px;
    padding: 12px 20px; font-size: 12px; font-family: inherit;
    background: var(--card2); border-left: 3px solid var(--green);
    color: var(--text); pointer-events: none;
    opacity: 0; transform: translateY(12px);
    transition: all .3s; z-index: 9999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-left-color: var(--red); }

  /* Block reason modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.8); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-top: 2px solid var(--red);
    padding: 32px; width: 420px;
  }
  .modal h3 { font-size: 15px; color: var(--white); margin-bottom: 6px; }
  .modal p  { font-size: 11px; color: var(--muted); margin-bottom: 20px; }
  .modal input {
    width: 100%; padding: 12px 14px;
    background: var(--card2); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 12px;
    outline: none; margin-bottom: 16px;
  }
  .modal input:focus { border-color: var(--red); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 11px; font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; border: none; letter-spacing: 1px; }
  .btn-confirm-block { background: var(--red); color: #fff; }
  .btn-cancel { background: var(--card2); color: var(--muted); border: 1px solid var(--border) !important; }

  @media (max-width: 900px) {
    .stats-bar { grid-template-columns: repeat(2,1fr); }
    .table-wrap { padding: 0 12px 40px; }
    .toolbar { padding: 12px; }
    .header { padding: 0 14px; }
  }
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="icon">⚡</div>
    <h1>LUCKYLOOP</h1>
    <p>ADMIN PANEL · DEVICE MANAGER</p>
    <input type="password" id="pw-input" placeholder="Admin Password লিখুন…" />
    <button onclick="doLogin()">→ প্রবেশ করুন</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- ══ MAIN APP ════════════════════════════════════════ -->
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span style="color:var(--yellow);font-size:20px">⚡</span>
      <div>
        <div class="logo">LUCKYLOOP</div>
        <div class="sub">ADMIN · DEVICE MANAGER</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-dot"></div>
      <span class="last-sync" id="last-sync">—</span>
      <button class="btn-logout" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="label">Total Devices</div>
      <div class="value total" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Active</div>
      <div class="value active" id="stat-active">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Blocked</div>
      <div class="value blocked" id="stat-blocked">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Online (5 min)</div>
      <div class="value online" id="stat-online">0</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" id="search-box" placeholder="🔍  Device name বা ID দিয়ে খুঁজুন…" oninput="renderTable()"/>
    <select id="filter-status" onchange="renderTable()">
      <option value="all">সব দেখান</option>
      <option value="active">শুধু Active</option>
      <option value="blocked">শুধু Blocked</option>
      <option value="online">Online (5 min)</option>
    </select>
    <button class="btn-refresh" onclick="loadDevices()">↻ Refresh</button>
    <span class="auto-label" id="auto-label">Auto refresh: 15s</span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Device</th>
          <th>License</th>
          <th>IP Address</th>
          <th>First Seen</th>
          <th>Last Seen</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="device-table-body">
        <tr class="empty-row"><td colspan="8">⏳ Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Block Reason Modal -->
<div class="modal-overlay" id="block-modal">
  <div class="modal">
    <h3>🚫 Device Block করুন</h3>
    <p id="modal-device-info">Device: —</p>
    <input type="text" id="block-reason-input" placeholder="Block করার কারণ (optional)" maxlength="200"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">বাতিল</button>
      <button class="btn-confirm-block" onclick="confirmBlock()">Block করুন</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const BASE = window.location.origin;
  let adminPw = '';
  let allDevices = [];
  let pendingBlockId = '';
  let autoTimer = null;
  let countdown = 15;

  // ── LOGIN ─────────────────────────────────────────────
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    const pw = document.getElementById('pw-input').value.trim();
    if (!pw) { showLoginErr('Password দিন!'); return; }
    adminPw = pw;
    fetch(`${BASE}/api/admin/devices`, {
      headers: { 'X-Admin-Password': adminPw }
    }).then(r => {
      if (r.status === 401) { showLoginErr('❌ Wrong password!'); adminPw = ''; return; }
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadDevices();
      startAutoRefresh();
    }).catch(() => showLoginErr('❌ Server error!'));
  }

  function showLoginErr(msg) {
    document.getElementById('login-err').textContent = msg;
    setTimeout(() => document.getElementById('login-err').textContent = '', 3000);
  }

  function doLogout() {
    adminPw = '';
    clearInterval(autoTimer);
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('pw-input').value = '';
  }

  // ── LOAD DEVICES ──────────────────────────────────────
  function loadDevices() {
    fetch(`${BASE}/api/admin/devices`, {
      headers: { 'X-Admin-Password': adminPw }
    })
    .then(r => r.json())
    .then(data => {
      allDevices = data;
      updateStats(data);
      renderTable();
      document.getElementById('last-sync').textContent =
        'Last sync: ' + new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    })
    .catch(() => showToast('❌ Server connect করতে পারছি না', true));
  }

  function startAutoRefresh() {
    countdown = 15;
    clearInterval(autoTimer);
    autoTimer = setInterval(() => {
      countdown--;
      document.getElementById('auto-label').textContent = `Auto refresh: ${countdown}s`;
      if (countdown <= 0) {
        loadDevices();
        countdown = 15;
      }
    }, 1000);
  }

  // ── STATS ─────────────────────────────────────────────
  function updateStats(devices) {
    const now = Date.now();
    const total   = devices.length;
    const blocked = devices.filter(d => d.is_blocked).length;
    const active  = total - blocked;
    const online  = devices.filter(d => {
      if (!d.last_seen) return false;
      const diff = (now - new Date(d.last_seen).getTime()) / 1000;
      return diff < 300;
    }).length;
    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-active').textContent  = active;
    document.getElementById('stat-blocked').textContent = blocked;
    document.getElementById('stat-online').textContent  = online;
  }

  // ── RENDER TABLE ──────────────────────────────────────
  function renderTable() {
    const q      = document.getElementById('search-box').value.toLowerCase();
    const filter = document.getElementById('filter-status').value;
    const now    = Date.now();

    let list = allDevices.filter(d => {
      const matchQ = !q ||
        (d.device_name || '').toLowerCase().includes(q) ||
        (d.device_id   || '').toLowerCase().includes(q) ||
        (d.license_key || '').toLowerCase().includes(q);
      if (!matchQ) return false;
      if (filter === 'blocked') return d.is_blocked;
      if (filter === 'active')  return !d.is_blocked;
      if (filter === 'online') {
        if (!d.last_seen) return false;
        return (now - new Date(d.last_seen).getTime()) / 1000 < 300;
      }
      return true;
    });

    const tbody = document.getElementById('device-table-body');
    if (!list.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">কোনো device পাওয়া যায়নি।</td></tr>';
      return;
    }

    tbody.innerHTML = list.map((d, i) => {
      const isOnline = d.last_seen
        ? (now - new Date(d.last_seen).getTime()) / 1000 < 300
        : false;

      const statusBadge = d.is_blocked
        ? `<span class="badge blocked"><span class="badge-dot"></span>BLOCKED</span>`
        : `<span class="badge active"><span class="badge-dot"></span>ACTIVE</span>`;

      // ✅ FIX: JSON.stringify দিয়ে device_id এবং device_name safely pass করা হচ্ছে
      // এতে single quote, special character কোনো সমস্যা করবে না
      const safeId   = JSON.stringify(d.device_id   || '');
      const safeName = JSON.stringify(d.device_name || 'Unknown');

      const actionBtn = d.is_blocked
        ? `<button class="btn-unblock" onclick="unblockDevice(${safeId})">✓ Unblock</button>`
        : `<button class="btn-block"   onclick="openBlockModal(${safeId}, ${safeName})">✕ Block</button>`;

      const blockReasonHtml = d.is_blocked && d.block_reason
        ? `<div style="font-size:10px;color:var(--red);margin-top:3px">💬 ${escHtml(d.block_reason)}</div>`
        : '';

      return `<tr>
        <td style="color:var(--muted);font-size:11px">${i+1}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="online-dot ${isOnline?'yes':'no'}"></span>
            <div>
              <div class="device-name">${escHtml(d.device_name || 'Unknown')}</div>
              <div class="device-id">${escHtml(d.device_id || '—')}</div>
              ${blockReasonHtml}
            </div>
          </div>
        </td>
        <td>
          <span class="license-tag">${escHtml((d.license_type||'').split('(')[0].trim() || 'Unknown')}</span>
        </td>
        <td class="device-ip">${escHtml(d.ip_address || '—')}</td>
        <td style="color:var(--muted);font-size:11px">${fmtTime(d.first_seen)}</td>
        <td style="color:${isOnline?'var(--green)':'var(--muted)'};font-size:11px">${fmtAgo(d.last_seen)}</td>
        <td>${statusBadge}</td>
        <td style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
          ${actionBtn}
          <button class="btn-delete" onclick="deleteDevice(${safeId})" title="Delete">🗑</button>
        </td>
      </tr>`;
    }).join('');
  }

  // ── BLOCK MODAL ───────────────────────────────────────
  function openBlockModal(deviceId, deviceName) {
    // ✅ FIX: এখন deviceId সরাসরি JS value হিসেবে আসছে, string manipulation নেই
    if (!deviceId) {
      showToast('❌ Device ID পাওয়া যায়নি!', true);
      return;
    }
    pendingBlockId = deviceId;
    document.getElementById('modal-device-info').textContent =
      'Device: ' + (deviceName || 'Unknown') + ' (' + deviceId + ')';
    document.getElementById('block-reason-input').value = '';
    document.getElementById('block-modal').classList.add('open');
    setTimeout(() => document.getElementById('block-reason-input').focus(), 100);
  }

  function closeModal() {
    document.getElementById('block-modal').classList.remove('open');
    pendingBlockId = '';
  }

  document.getElementById('block-reason-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmBlock();
    if (e.key === 'Escape') closeModal();
  });

  function confirmBlock() {
    if (!pendingBlockId) {
      showToast('❌ Device ID missing!', true);
      closeModal();
      return;
    }
    const reason = document.getElementById('block-reason-input').value.trim()
      || 'Admin কর্তৃক block করা হয়েছে';
    closeModal();
    blockDevice(pendingBlockId, reason);
  }

  // ── API CALLS ─────────────────────────────────────────
  function blockDevice(deviceId, reason) {
    if (!deviceId) {
      showToast('❌ device_id required!', true);
      return;
    }
    fetch(`${BASE}/api/admin/block?password=${encodeURIComponent(adminPw)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_id: deviceId, reason: reason })
    })
    .then(r => r.json())
    .then(d => {
      if (d.error) { showToast('❌ ' + d.error, true); return; }
      showToast('🚫 Device block করা হয়েছে');
      loadDevices();
    })
    .catch(() => showToast('❌ Error হয়েছে', true));
  }

  function unblockDevice(deviceId) {
    if (!deviceId) {
      showToast('❌ device_id required!', true);
      return;
    }
    fetch(`${BASE}/api/admin/unblock?password=${encodeURIComponent(adminPw)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_id: deviceId })
    })
    .then(r => r.json())
    .then(d => {
      if (d.error) { showToast('❌ ' + d.error, true); return; }
      showToast('✅ Device unblock করা হয়েছে');
      loadDevices();
    })
    .catch(() => showToast('❌ Error হয়েছে', true));
  }

  function deleteDevice(deviceId) {
    if (!deviceId) {
      showToast('❌ device_id required!', true);
      return;
    }
    if (!confirm('এই device টা permanently delete করবেন?')) return;
    fetch(`${BASE}/api/admin/delete?password=${encodeURIComponent(adminPw)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_id: deviceId })
    })
    .then(r => r.json())
    .then(d => {
      if (d.error) { showToast('❌ ' + d.error, true); return; }
      showToast('🗑 Device delete করা হয়েছে');
      loadDevices();
    })
    .catch(() => showToast('❌ Error হয়েছে', true));
  }

  // ── HELPERS ───────────────────────────────────────────
  function fmtTime(iso) {
    if (!iso) return '—';
    try {
      return new Date(iso).toLocaleString('en-GB', {
        day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'
      });
    } catch { return iso; }
  }

  function fmtAgo(iso) {
    if (!iso) return '—';
    try {
      const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (s < 10)   return 'just now';
      if (s < 60)   return s + 's ago';
      if (s < 3600) return Math.floor(s/60) + ' min ago';
      if (s < 86400)return Math.floor(s/3600) + ' hr ago';
      return Math.floor(s/86400) + ' day ago';
    } catch { return iso; }
  }

  function escHtml(s) {
    return String(s||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error' : '';
    void t.offsetWidth;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
